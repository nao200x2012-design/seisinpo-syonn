<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精神ポーション</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sawarabi Mincho', serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #startScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }
        .container {
            width: 85%;
            max-width: 500px;
            background: #fff;
            padding: 60px 40px;
            border-radius: 2px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0;
            line-height: 2.8;
            color: #1a1a1a;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        ruby rt { font-size: 0.8rem; color: #666; }
        .btn {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 15px 35px;
            font-size: 1rem;
            letter-spacing: 0.2rem;
            cursor: pointer;
            border-radius: 2px;
            transition: 0.5s;
        }
        .btn:hover { background-color: #000; letter-spacing: 0.4rem; }
        .sub-btn {
            margin-top: 50px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <button class="btn" onclick="startExperience()">精神ポーションを仰ぐ</button>
    </div>
    <div class="container" id="mainContent">
        <h1 id="triviaText"></h1>
        <button class="sub-btn" onclick="getRandomTrivia()">他の言葉を仰ぐ</button>
    </div>
    
    <audio id="bgm" loop preload="auto">
        <source id="audioSource" type="audio/mpeg">
    </audio>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8MJY0GISlxjjJsvGxJQQVs9gT9yGWQYV77rbCPiIG2cPyo6LSkmd-DcPSAZSbAhq0Z6LBj1iTkdhm/pub?output=csv&t=' + new Date().getTime();
        let allData = [];
        let isTyping = false;
        const audio = document.getElementById('bgm');
        const source = document.getElementById('audioSource');

        // 音楽ファイルの絶対パス
        const musicUrl = 'https://nao200x2012-design.github.io/seisinpo-syonn/bgm.mp3';
        source.src = musicUrl + '?v=' + new Date().getTime();
        audio.load();

        async function loadData() {
            try {
                const res = await fetch(csvUrl);
                const text = await res.text();
                const lines = text.trim().split(/\r?\n/);
                allData = lines.map(line => {
                    const parts = line.split(/,(.*)/);
                    return parts[1] ? parts[1].replace(/^"|"$/g, '').replace(/""/g, '"').trim() : parts[0].replace(/"/g, '').trim();
                }).filter(t => t.length > 1);
            } catch (e) { console.error("データ取得エラー"); }
        }

        function startExperience() {
            document.getElementById('startScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('startScreen').style.display = 'none';
                document.getElementById('mainContent').style.opacity = '1';
            }, 1000);
            
            audio.volume = 0.3;
            audio.play().catch(e => {
                console.error("再生失敗:", e);
            });
            showDaily();
        }

        function formatText(text) {
            let formatted = text.replace(/([、。！？」])\s*/g, '$1<br>') 
                                .replace(/(.{12,18}?[、。！？」])/g, '$1<br>');
            return formatted.replace(/([一-龠]+)\(([^)]+)\)/g, '<ruby>$1<rt>$2</rt></ruby>');
        }

        async function typeWriter(fullText) {
            if (isTyping) return;
            isTyping = true;
            const target = document.getElementById('triviaText');
            target.innerHTML = "";
            const htmlContent = formatText(fullText);
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlContent;
            const nodes = Array.from(tempDiv.childNodes);
            
            // 全体で「約3秒」になるよう計算（3000ms / ノード数）
            // 極端に短い場合に速すぎないよう、最低50msの待機を設ける
            const speed = Math.max(50, 3000 / Math.max(nodes.length * 2, 10));

            for (let node of nodes) {
                if (node.nodeType === 3) {
                    const chars = node.textContent.split("");
                    for (let char of chars) {
                        target.innerHTML += char;
                        await new Promise(r => setTimeout(r, speed));
                    }
                } else {
                    target.appendChild(node.cloneNode(true));
                    await new Promise(r => setTimeout(r, speed));
                }
            }
            isTyping = false;
        }

        function showDaily() {
            if (!allData.length) return;
            const day = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
            typeWriter(allData[day % allData.length]);
        }

        function getRandomTrivia() {
            if (isTyping) return;
            typeWriter(allData[Math.floor(Math.random() * allData.length)]);
        }

        loadData();
    </script>
</body>
</html>
