<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精神ポーション</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sawarabi Mincho', serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #startScreen {
            position: fixed;
            inset: 0;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .container {
            width: 85%;
            max-width: 500px;
            background: #fff;
            padding: 60px 40px;
            border-radius: 2px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease;
        }

        h1 {
            font-size: 1.6rem;
            line-height: 2.4;
            min-height: 200px;
            color: #1a1a1a;
            margin: 0;
        }

        ruby rt {
            font-size: 0.8rem;
            color: #666;
        }

        .btn {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 15px 35px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 2px;
        }

        .sub-btn {
            margin-top: 40px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.9rem;
        }

        .sub-btn:hover {
            color: #333;
        }

        @media (max-width: 600px) {
            .container {
                width: 88%;
                padding: 40px 20px;
            }

            h1 {
                font-size: 1.4rem;
                line-height: 2.2;
                min-height: 180px;
            }

            .btn {
                font-size: 1rem;
                padding: 14px 28px;
            }
        }
    </style>
</head>
<body>

<div id="startScreen">
    <button class="btn" onclick="startExperience()">精神ポーションを飲む</button>
</div>

<div class="container" id="mainContent">
    <h1 id="triviaText"></h1>
    <button class="sub-btn" onclick="getRandomTrivia()">もう一口飲む</button>
</div>

<script>
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8MJY0GISlxjjJsvGxJQQVs9gT9yGWQYV77rbCPiIG2cPyo6LSkmd-DcPSAZSbAhq0Z6LBj1iTkdhm/pub?output=csv&t=' + Date.now();
const musicUrl = 'https://nao200x2012-design.github.io/seisinpo-syonn/bgm2.mp3';

let allData = [];
let isTyping = false;
let audio = null;

const startScreen = document.getElementById('startScreen');
const mainContent = document.getElementById('mainContent');
const triviaText = document.getElementById('triviaText');

async function loadData() {
    try {
        const res = await fetch(csvUrl, { cache: 'no-store' });
        const text = await res.text();

        const lines = text.trim().split(/\r?\n/);

        allData = lines.map(line => {
            const parts = line.split(/,(.*)/);
            return parts[1]
                ? parts[1].replace(/^"|"$/g, '').replace(/""/g, '"').trim()
                : parts[0].replace(/"/g, '').trim();
        }).filter(t => t.length > 1);

    } catch (e) {
        console.error('データ取得エラー:', e);
        triviaText.innerHTML = '言葉の読み込みに失敗しました。';
    }
}

function formatText(text) {
    return text
        .replace(/([、。！？」])/g, '$1<br>')
        .replace(/([一-龠々]+)\(([^)]+)\)/g, '<ruby>$1<rt>$2</rt></ruby>');
}

async function typeWriter(text) {
    if (isTyping) return;
    isTyping = true;

    triviaText.innerHTML = '';

    const html = formatText(text);
    const temp = document.createElement('div');
    temp.innerHTML = html;
    const nodes = Array.from(temp.childNodes);

    for (const node of nodes) {
        if (node.nodeType === 3) {
            for (const c of node.textContent) {
                triviaText.innerHTML += c;
                await new Promise(r => setTimeout(r, 30));
            }
        } else {
            triviaText.appendChild(node.cloneNode(true));
        }
    }

    isTyping = false;
}

function showDaily() {
    if (!allData.length) return;
    const i = Math.floor(Math.random() * allData.length);
    typeWriter(allData[i]);
}

function getRandomTrivia() {
    if (isTyping) return;
    showDaily();
}

async function startExperience() {
    try {
        audio = new Audio();
        audio.src = musicUrl + '?v=' + Date.now();
        audio.loop = true;
        audio.volume = 0.3;
        audio.preload = 'auto';

        await audio.play();
        console.log('BGM再生成功');
    } catch (e) {
        console.error('BGM再生失敗', e);
        alert('BGM再生失敗: ' + e.name + ' / ' + e.message);
    }

    startScreen.style.opacity = '0';
    setTimeout(() => {
        startScreen.style.display = 'none';
        mainContent.style.opacity = '1';
    }, 1000);

    showDaily();
}

loadData();
</script>

</body>
</html>
