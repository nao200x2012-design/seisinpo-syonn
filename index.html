<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精神ポーション（瀕死用）</title>
    <style>
        /* デザイン：清潔感のあるカードUI */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            width: 90%;
            max-width: 450px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .date-label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }
        .number {
            font-size: 1.2rem;
            color: #4CAF50;
            font-weight: bold;
            margin-bottom: 5px;
        }
        h1 {
            font-size: 1.6rem;
            margin: 15px 0;
            line-height: 1.4;
            color: #2c3e50;
        }
        .btn {
            margin-top: 30px;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            transition: 0.3s;
            outline: none;
        }
        .btn:active { transform: scale(0.95); }
        .error-msg { color: #e74c3c; font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="date-label" id="todayDate"></div>
    <div class="number" id="triviaNum">...</div>
    <h1 id="triviaText">読み込み中...</h1>
    <button class="btn" onclick="getRandomTrivia()">他の言葉を見る</button>
    <div id="errorMessage" class="error-msg"></div>
</div>

<script>
    // URLの末尾にある不要な改行やスペースを自動で削除するように設定
    const rawUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8MJY0GISlxjjJsvGxJQQVs9gT9yGWQYV77rbCPiIG2cPyo6LSkmd-DcPSAZSbAhq0Z6LBj1iTkdhm/pub?output=csv';
    const csvUrl = rawUrl.trim();

    let allData = [];

    // 今日の日付を表示
    const d = new Date();
    document.getElementById('todayDate').innerText = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} の心の栄養`;

    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('スプレッドシートへのアクセスに失敗しました');
            
            const csvText = await response.text();
            allData = parseCSV(csvText);
            
            if (allData.length === 0) throw new Error('データが読み込めませんでした');
            
            // 最初は「日替わり」で表示
            showDailyTrivia();
        } catch (e) {
            document.getElementById('triviaText').innerText = "読み込みエラー";
            document.getElementById('errorMessage').innerText = "スプレッドシートの公開設定を確認してください。";
            console.error(e);
        }
    }

    // CSVを正しく分割する関数（カンマや引用符の処理を強化）
    function parseCSV(text) {
        const lines = text.trim().split(/\r?\n/);
        return lines.map(line => {
            // 最初のカンマだけで分割する
            const firstComma = line.indexOf(',');
            if (firstComma === -1) return null;

            const id = line.substring(0, firstComma).replace(/"/g, '').trim();
            const textContent = line.substring(firstComma + 1).replace(/^"|"$/g, '').replace(/""/g, '"').trim();
            
            return { id: id, text: textContent };
        }).filter(item => item !== null && item.text !== "");
    }

    // 日替わりロジック
    function showDailyTrivia() {
        if (allData.length === 0) return;
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const oneDay = 1000 * 60 * 60 * 24;
        const dayOfYear = Math.floor(diff / oneDay);
        
        const index = dayOfYear % allData.length;
        display(allData[index]);
    }

    // ランダム表示（ボタン用）
    function getRandomTrivia() {
        if (allData.length === 0) return;
        const index = Math.floor(Math.random() * allData.length);
        display(allData[index]);
    }

    function display(item) {
        document.getElementById('triviaNum').innerText = `No. ${item.id}`;
        document.getElementById('triviaText').innerText = item.text;
        document.getElementById('errorMessage').innerText = "";
    }

    loadData();
</script>

</body>
</html>
