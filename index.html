<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精神ポーション（瀕死用）</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #333; }
        .container { width: 90%; max-width: 450px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .date-label { font-size: 0.9rem; color: #888; margin-bottom: 10px; }
        .number { font-size: 1.2rem; color: #4CAF50; font-weight: bold; margin-bottom: 5px; }
        h1 { font-size: 1.6rem; margin: 15px 0; line-height: 1.4; color: #2c3e50; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .btn { margin-top: 30px; background-color: #4CAF50; color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 50px; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
<div class="container">
    <div class="date-label" id="todayDate"></div>
    <div class="number" id="triviaNum">...</div>
    <h1 id="triviaText">読み込み中...</h1>
    <button class="btn" onclick="getRandomTrivia()">他の言葉を見る</button>
</div>
<script>
    // 完全に1行で書くことでエラーを防ぎます
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8MJY0GISlxjjJsvGxJQQVs9gT9yGWQYV77rbCPiIG2cPyo6LSkmd-DcPSAZSbAhq0Z6LBj1iTkdhm/pub?output=csv';

    let allData = [];
    const d = new Date();
    document.getElementById('todayDate').innerText = d.toLocaleDateString() + " の心の栄養";

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const text = await res.text();
            const lines = text.trim().split(/\r?\n/);
            allData = lines.map(line => {
                const parts = line.split(/,(.*)/);
                return { id: parts[0].replace(/"/g, ''), text: (parts[1] || "").replace(/^"|"$/g, '').replace(/""/g, '"').trim() };
            }).filter(item => item.text);
            showDaily();
        } catch (e) {
            document.getElementById('triviaText').innerText = "読み込みエラー";
        }
    }

    function showDaily() {
        const day = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
        display(allData[day % allData.length]);
    }

    function getRandomTrivia() {
        display(allData[Math.floor(Math.random() * allData.length)]);
    }

    function display(item) {
        document.getElementById('triviaNum').innerText = "No. " + item.id;
        document.getElementById('triviaText').innerText = item.text;
    }
    loadData();
</script>
</body>
</html>
