<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGMテスト</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    button {
      font-size: 20px;
      padding: 16px 28px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="playBtn">BGMを再生</button>

  <script>
    const musicUrl = 'https://nao200x2012-design.github.io/seisinpo-syonn/bgm.mp3?v=' + Date.now();
    const audio = new Audio();

    audio.loop = true;
    audio.preload = 'none';
    audio.volume = 0.3;

    document.getElementById('playBtn').addEventListener('click', async () => {
      try {
        audio.src = musicUrl;
        await audio.play();
        alert('再生開始できました');
        console.log('再生成功');
      } catch (e) {
        console.error('再生失敗', e);
        alert('再生失敗');
      }
    });
  </script>
</body>
</html>
