<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精神ポーション</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sawarabi Mincho', serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 85%;
            max-width: 500px;
            background: #fff;
            padding: 60px 40px;
            border-radius: 2px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        /* ルび（ふりがな）の設定 */
        h1 {
            font-size: 1.8rem;
            margin: 0;
            line-height: 2.8; /* ふりがな用に少し行間を広げる */
            color: #333;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            word-break: break-all;
        }
        ruby rt {
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 0.1rem;
        }
        .btn {
            margin-top: 50px;
            background-color: #333;
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 3px;
            opacity: 0.5;
            transition: 0.5s;
        }
        .btn:hover { opacity: 1; }
    </style>
</head>
<body>
<div class="container">
    <h1 id="triviaText"></h1>
    <button class="btn" onclick="getRandomTrivia()">他の言葉を仰ぐ</button>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8MJY0GISlxjjJsvGxJQQVs9gT9yGWQYV77rbCPiIG2cPyo6LSkmd-DcPSAZSbAhq0Z6LBj1iTkdhm/pub?output=csv&t=' + new Date().getTime();
    let allData = [];
    let isTyping = false;

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const text = await res.text();
            const lines = text.trim().split(/\r?\n/);
            allData = lines.map(line => {
                const parts = line.split(/,(.*)/);
                return parts[1] ? parts[1].replace(/^"|"$/g, '').replace(/""/g, '"').trim() : parts[0].replace(/"/g, '').trim();
            }).filter(t => t.length > 1);
            show();
        } catch (e) { document.getElementById('triviaText').innerText = "読み込みエラー"; }
    }

    // 文字列を解析してルビを振る簡易関数
    function createRubyHtml(text) {
        // カンマや読点、または意味の区切りで適度に改行コードを挟む
        let formattedText = text.replace(/([、。！？」]) /g, '$1<br>') // 句読点の後のスペースで改行
                                .replace(/(.{12,18}?[、。！？」])/g, '$1<br>'); // 長すぎる場合に句読点で改行

        // ※スプレッドシート側で「漢字(かんじ)」のように書かれている場合に対応
        return formattedText.replace(/([一-龠]+)\(([^)]+)\)/g, '<ruby>$1<rt>$2</rt></ruby>');
    }

    async function typeWriter(fullText) {
        if (isTyping) return;
        isTyping = true;
        
        const target = document.getElementById('triviaText');
        target.innerHTML = "";
        
        // ふりがな指定「漢字(かんじ)」を解析してHTMLタグ化
        const processedHtml = createRubyHtml(fullText);
        
        // 1文字ずつではなく、「意味のあるタグ単位」で表示するために一時的な要素を作成
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = processedHtml;
        const nodes = Array.from(tempDiv.childNodes);
        
        // 全体の表示時間を約4秒に設定
        const speed = 4000 / Math.max(nodes.length, 10);

        for (let node of nodes) {
            const span = document.createElement('span');
            target.appendChild(span);
            
            if (node.nodeType === 3) { // テキストノード
                const chars = node.textContent.split("");
                for (let char of chars) {
                    span.textContent += char;
                    await new Promise(r => setTimeout(r, speed));
                }
            } else { // rubyタグやbrタグ
                target.appendChild(node.cloneNode(true));
                await new Promise(r => setTimeout(r, speed * 2));
            }
        }
        isTyping = false;
    }

    function show() {
        const day = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
        typeWriter(allData[day % allData.length]);
    }

    function getRandomTrivia() {
        typeWriter(allData[Math.floor(Math.random() * allData.length)]);
    }

    loadData();
</script>
</body>
</html>
