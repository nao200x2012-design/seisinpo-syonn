<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精神ポーション</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sawarabi Mincho', serif; /* 和風の筆致に近い明朝体 */
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 85%;
            max-width: 500px;
            background: #fff;
            padding: 60px 40px;
            border-radius: 2px; /* 和紙のような角のあるデザイン */
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            position: relative;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0;
            line-height: 2.0;
            color: #1a1a1a;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            white-space: pre-wrap; /* 改行を反映 */
        }
        .btn {
            margin-top: 50px;
            background-color: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 0.8rem;
            letter-spacing: 0.1rem;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.5s;
        }
        .btn:hover { opacity: 1; }
    </style>
</head>
<body>
<div class="container">
    <h1 id="triviaText"></h1>
    <button class="btn" onclick="getRandomTrivia()">他の言葉を仰ぐ</button>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8MJY0GISlxjjJsvGxJQQVs9gT9yGWQYV77rbCPiIG2cPyo6LSkmd-DcPSAZSbAhq0Z6LBj1iTkdhm/pub?output=csv&t=' + new Date().getTime();
    let allData = [];
    let currentText = "";
    let isTyping = false;

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const text = await res.text();
            const lines = text.trim().split(/\r?\n/);
            allData = lines.map(line => {
                const parts = line.split(/,(.*)/);
                return parts[1] ? parts[1].replace(/^"|"$/g, '').replace(/""/g, '"').trim() : parts[0].replace(/"/g, '').trim();
            }).filter(t => t.length > 1);
            show();
        } catch (e) { document.getElementById('triviaText').innerText = "読み込みに失敗しました"; }
    }

    function show() {
        const day = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
        typeWriter(allData[day % allData.length]);
    }

    function getRandomTrivia() {
        if (isTyping) return; // 執筆中はボタン無効
        typeWriter(allData[Math.floor(Math.random() * allData.length)]);
    }

    // 1文字ずつ書いていく演出
    function typeWriter(text) {
        isTyping = true;
        const target = document.getElementById('triviaText');
        target.innerText = "";
        let i = 0;
        
        // 文字数に応じて速度を調整（全体で約3〜5秒になるように）
        const speed = Math.max(80, Math.min(150, 4000 / text.length));

        function type() {
            if (i < text.length) {
                target.innerText += text.charAt(i);
                i++;
                setTimeout(type, speed);
            } else {
                isTyping = false;
            }
        }
        type();
    }

    loadData();
</script>
</body>
</html>
