<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精神ポーション</title>

<style>
body {
    font-family: sans-serif;
    background-color: #f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    transition: background-color 1.8s ease;
}

#startScreen {
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f0f2f5;
}

.container {
    opacity:0;
    transition:2s;
}
</style>
</head>

<body>

<div id="startScreen">
<button onclick="startExperience()">精神ポーションを飲む</button>
</div>

<div class="container" id="mainContent">
<h1 id="text"></h1>
<button onclick="next()">もう一口飲む</button>
</div>

<audio id="bgm" loop>
<source src="https://nao200x2012-design.github.io/seisinpo-syonn/bgm_final.mp3">
</audio>

<audio id="drink">
<source src="https://nao200x2012-design.github.io/seisinpo-syonn/gulp_down_water1.mp3">
</audio>

<script>

const bgm = document.getElementById("bgm");
const drink = document.getElementById("drink");
const screen = document.getElementById("startScreen");
const main = document.getElementById("mainContent");

bgm.volume = 0.25;
drink.volume = 1.0;

function flash(){
    const colors = ["#e6f7ff","#ffe6f2","#fff4cc","#e8ffd9","#f0e6ff","#ffe9d6","#e6fff9"];
    const c = colors[Math.floor(Math.random()*colors.length)];

    document.body.style.backgroundColor = c;

    setTimeout(()=>{
        document.body.style.backgroundColor = "#f0f2f5";
    },1800);
}

async function startExperience(){

    // 🔥 iPhone対策：BGMを一瞬だけ解放
    try{
        await bgm.play();
        bgm.pause();
        bgm.currentTime = 0;
    }catch(e){}

    // 🔥 飲む音
    await drink.play();

    flash();

    // 🔥 飲み終わったらBGM開始
    bgm.play();

    // 画面
    screen.style.opacity = 0;
    setTimeout(()=>{
        screen.style.display="none";
        main.style.opacity = 1;
    },1000);
}

function next(){
    flash();
    drink.currentTime = 0;
    drink.play();
}

</script>

</body>
</html>
