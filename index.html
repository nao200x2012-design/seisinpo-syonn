<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精神ポーション（瀕死用）</title>
    <style>
        /* デザイン：清潔感のあるカードUI */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            width: 90%;
            max-width: 450px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .date-label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }
        .number {
            font-size: 1.2rem;
            color: #4CAF50;
            font-weight: bold;
            margin-bottom: 5px;
        }
        h1 {
            font-size: 1.6rem;
            margin: 15px 0;
            line-height: 1.4;
            color: #2c3e50;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            margin-top: 30px;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            transition: 0.3s;
            outline: none;
        }
        .btn:active { transform: scale(0.95); }
        .error-msg { color: #e74c3c; font-size: 0.8rem; margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="date-label" id="todayDate"></div>
    <div class="number" id="triviaNum">...</div>
    <h1 id="triviaText">読み込み中...</h1>
    <button class="btn" onclick="getRandomTrivia()">他の言葉を見る</button>
    <div id="errorMessage" class="error-msg"></div>
</div>

<script>
    // ★URLを1行にまとめ、前後の空白を自動削除する処理
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8MJY0GISlxjjJsvGxJQQVs9gT9yGWQYV77rbCPiIG2cPyo6LSkmd-DcPSAZSbAhq0Z6LBj1iTkdhm/pub?output=csv'.trim();

    let allData = [];

    // 今日の日付を表示
    const d = new Date();
    document.getElementById('todayDate').innerText = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} の心の栄養`;

    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('スプレッドシートにアクセスできません。');
            
            const csvText = await response.text();
            allData = parseCSV(csvText);
            
            if (allData.length === 0) throw new Error('データが解析できません。');
            
            showDailyTrivia();
        } catch (e) {
            document.getElementById('triviaText').innerText = "読み込みエラー";
            document.getElementById('errorMessage').innerHTML = "スプレッドシートのURLまたは公開設定を確認してください。";
            console.error(e);
        }
    }

    function parseCSV(text) {
        const lines = text.trim().split(/\r?\n/);
        const result = [];
        for (let line of lines) {
            const firstComma = line.indexOf(',');
            if (firstComma === -1) continue;
            const id = line.substring(0, firstComma).replace(/"/g, '').trim();
            const content = line.substring(firstComma + 1).replace(/^"|"$/g, '').replace(/""/g, '"').trim();
            if (content) result.push({ id: id, text: content });
        }
        return result;
    }

    function showDailyTrivia() {
        if (allData.length === 0) return;
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
        display(allData[dayOfYear % allData.length]);
    }

    function getRandomTrivia() {
        if (allData.length === 0) return;
        display(allData[Math.floor(Math.random() * allData.length)]);
    }

    function display(item) {
        document.getElementById('triviaNum').innerText = `No. ${item.id}`;
        document.getElementById('triviaText').innerText = item.text;
        document.getElementById('errorMessage').innerText = "";
    }

    loadData();
</script>

</body>
</html>
